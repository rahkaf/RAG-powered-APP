server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  # Docker container logs
  - job_name: docker
    static_configs:
      - targets:
          - localhost
        labels:
          job: docker
          __path__: /var/lib/docker/containers/*/*-json.log

    pipeline_stages:
      - docker: {}

      # Extract JSON fields
      - json:
          expressions:
            level: level
            message: message
            service: service
            timestamp: timestamp

      # Label extraction
      - labels:
          level:
          service:

      # Timestamp extraction
      - timestamp:
          source: timestamp
          format: RFC3339Nano

      # Output formatting
      - output:
          source: output

  # Application logs
  - job_name: kc-apps
    static_configs:
      - targets:
          - localhost
        labels:
          job: kc-apps
          __path__: /var/log/kc/*.log

    pipeline_stages:
      - json:
          expressions:
            level: level
            service: service
            event: event

      - labels:
          level:
          service:
