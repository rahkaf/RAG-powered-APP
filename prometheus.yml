global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  # Prometheus self-monitoring
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  # API Gateway metrics
  - job_name: "api-gateway"
    static_configs:
      - targets: ["api-gateway:8000"]
    metrics_path: "/metrics"
    scrape_interval: 10s

  # Query Engine metrics
  - job_name: "query-engine"
    static_configs:
      - targets: ["query-engine:8001"]
    metrics_path: "/metrics"
    scrape_interval: 10s
